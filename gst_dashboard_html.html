<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GST Intelligence Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f4f6fb;color:#1a1a2e;min-height:100vh}
header{background:#1a3a6b;color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
header h1{font-size:20px;font-weight:600;display:flex;align-items:center;gap:8px}
.badge{background:#e24b4a;color:#fff;font-size:11px;padding:2px 8px;border-radius:999px;display:none}
.refresh-info{font-size:12px;opacity:0.75}
.container{max-width:900px;margin:0 auto;padding:20px 16px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px}
.stat{background:#fff;border-radius:10px;padding:12px 16px;border:1px solid #e0e4ef}
.stat-n{font-size:24px;font-weight:600;color:#1a3a6b}
.stat-l{font-size:11px;color:#666;margin-top:2px}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
#search{flex:1;min-width:180px;padding:8px 14px;border:1px solid #d0d5e8;border-radius:8px;font-size:14px;background:#fff}
.cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.cat-btn{padding:5px 14px;border-radius:999px;border:1px solid #c5cce0;background:#fff;font-size:12px;cursor:pointer;color:#444}
.cat-btn.active{background:#1a3a6b;color:#fff;border-color:#1a3a6b}
.feed{display:flex;flex-direction:column;gap:10px}
.card{background:#fff;border-radius:12px;border:1px solid #e0e4ef;padding:14px 16px;cursor:pointer;transition:box-shadow 0.15s}
.card:hover{box-shadow:0 2px 12px rgba(26,58,107,0.1)}
.card.unread{border-left:4px solid #1a3a6b}
.card-top{display:flex;gap:10px;align-items:flex-start}
.tag{font-size:11px;padding:3px 9px;border-radius:999px;font-weight:500;white-space:nowrap}
.card-title{font-size:14px;font-weight:500;line-height:1.45;flex:1}
.card-meta{font-size:12px;color:#888;margin-top:6px;display:flex;gap:14px;flex-wrap:wrap}
.detail{display:none;margin-top:12px;border-top:1px solid #f0f2f8;padding-top:12px;font-size:13px;color:#444;line-height:1.7}
.detail.open{display:block}
.detail a{color:#1a3a6b;font-size:12px;display:inline-block;margin-top:8px}
.msg{text-align:center;padding:2rem;color:#666;font-size:14px}
.spin{display:inline-block;width:16px;height:16px;border:2px solid #ddd;border-top-color:#1a3a6b;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:-3px;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:#fff0f0;color:#a32d2d;border-radius:8px;padding:12px 16px;font-size:13px;text-align:center}
footer{text-align:center;padding:20px;font-size:12px;color:#888}
</style>
</head>
<body>

<header>
  <h1>📋 GST Intelligence Dashboard</h1>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="badge" id="badge">0 unread</span>
    <span class="refresh-info" id="timer">Auto-refresh in 5:00</span>
  </div>
</header>

<div class="container">
  <div class="stats">
    <div class="stat"><div class="stat-n" id="s-total">—</div><div class="stat-l">Total Updates</div></div>
    <div class="stat"><div class="stat-n" id="s-unread">—</div><div class="stat-l">Unread</div></div>
    <div class="stat"><div class="stat-n" id="s-today">—</div><div class="stat-l">Today</div></div>
    <div class="stat"><div class="stat-n" id="s-src">—</div><div class="stat-l">Sources</div></div>
  </div>

  <div class="controls">
    <input id="search" type="text" placeholder="Search by keyword, circular no., section…" oninput="render()">
  </div>

  <div class="cats" id="cats"></div>
  <div class="feed" id="feed"><div class="msg"><span class="spin"></span>Loading GST updates…</div></div>
</div>

<footer>Data sourced from CBIC, GST Council & public GST portals. Updates every 5 minutes.</footer>

<script>
const FEEDS = [
  { url: 'https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.cbic.gov.in%2Frss%2Fcbec-rss.xml', src: 'CBIC' },
  { url: 'https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fpib.gov.in%2FRSS%2FRSSFEED.aspx%3FCatID%3D35', src: 'PIB' },
  { url: 'https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Ftaxguru.in%2Fcategory%2Fgoods-and-service-tax%2Ffeed%2F', src: 'TaxGuru' },
  { url: 'https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.gstcouncil.gov.in%2Frss.xml', src: 'GST Council' },
  { url: 'https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fcaclub.in%2Fcategory%2Fgst%2Ffeed%2F', src: 'CAclub' }
];

const CAT_MAP = {
  'Notification': ['notification','notfn','not.'],
  'Circular': ['circular','circ.'],
  'Amendment': ['amendment','amend','finance act','budget'],
  'Case Law': ['case','order','judgment','tribunal','high court','supreme court','itat','gstat','aaar','aar'],
  'GST Council': ['council','meeting','recommendation'],
  'News': []
};

const TAG_STYLES = {
  'Notification': 'background:#dbeafe;color:#1e40af',
  'Circular': 'background:#dcfce7;color:#166534',
  'Amendment': 'background:#fef9c3;color:#854d0e',
  'Case Law': 'background:#fce7f3;color:#9d174d',
  'GST Council': 'background:#ede9fe;color:#4c1d95',
  'News': 'background:#f1f5f9;color:#334155'
};

function categorize(title='', desc='') {
  const txt = (title+' '+desc).toLowerCase();
  for (const [cat, kws] of Object.entries(CAT_MAP)) {
    if (cat === 'News') continue;
    if (kws.some(k => txt.includes(k))) return cat;
  }
  return 'News';
}

function strip(html='') {
  return html.replace(/<[^>]*>/g,'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&nbsp;/g,' ').replace(/&#39;/g,"'").replace(/&quot;/g,'"').trim();
}

function fmtDate(d) {
  try { return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); } catch { return d; }
}

let allItems=[], activeCat='All', readIds=new Set(), timerInt, countdown=300;

async function fetchAll() {
  document.getElementById('feed').innerHTML='<div class="msg"><span class="spin"></span>Fetching latest GST updates…</div>';
  const results = await Promise.allSettled(FEEDS.map(f=>fetch(f.url).then(r=>r.json()).then(d=>({d,src:f.src}))));
  const items=[];
  results.forEach(r=>{
    if(r.status!=='fulfilled') return;
    const {d,src}=r.value;
    if(!d.items) return;
    d.items.slice(0,15).forEach((item,i)=>{
      const title=strip(item.title||'');
      const desc=strip(item.description||item.content||'').slice(0,300);
      if(!title) return;
      items.push({
        id: src+'-'+i+'-'+Date.now(),
        title,
        summary: desc || 'Click to read full update on source website.',
        category: categorize(title, desc),
        date: item.pubDate||item.published||'',
        source: src,
        url: item.link||item.url||''
      });
    });
  });
  if(!items.length) {
    document.getElementById('feed').innerHTML='<div class="err">Could not load updates. Check your internet connection and try refreshing.</div>';
    return;
  }
  allItems = items.sort((a,b)=>new Date(b.date)-new Date(a.date));
  buildCats();
  render();
  startCountdown();
}

function buildCats() {
  const cats=['All',...new Set(allItems.map(i=>i.category))];
  document.getElementById('cats').innerHTML=cats.map(c=>`<button class="cat-btn${c===activeCat?' active':''}" onclick="setCat('${c}')">${c}</button>`).join('');
}

function setCat(c){ activeCat=c; buildCats(); render(); }

function render() {
  const q=document.getElementById('search').value.toLowerCase();
  let items=allItems.filter(i=>activeCat==='All'||i.category===activeCat);
  if(q) items=items.filter(i=>(i.title+' '+i.summary+' '+i.category).toLowerCase().includes(q));
  const today=new Date().toDateString();
  document.getElementById('s-total').textContent=allItems.length;
  document.getElementById('s-unread').textContent=allItems.filter(i=>!readIds.has(i.id)).length;
  document.getElementById('s-today').textContent=allItems.filter(i=>new Date(i.date).toDateString()===today).length;
  document.getElementById('s-src').textContent=new Set(allItems.map(i=>i.source)).size;
  updateBadge();
  if(!items.length){document.getElementById('feed').innerHTML='<div class="msg">No updates found.</div>';return;}
  document.getElementById('feed').innerHTML=items.map(it=>{
    const unread=!readIds.has(it.id);
    return `<div class="card${unread?' unread':''}" onclick="toggle('${it.id}',this)">
      <div class="card-top">
        <span class="tag" style="${TAG_STYLES[it.category]||TAG_STYLES.News}">${it.category}</span>
        <span class="card-title">${it.title}</span>
      </div>
      <div class="card-meta">
        <span>📅 ${fmtDate(it.date)}</span>
        <span>🏛 ${it.source}</span>
      </div>
      <div class="detail" id="d-${it.id}">
        <p>${it.summary}</p>
        ${it.url?`<a href="${it.url}" target="_blank" rel="noopener">🔗 View full update →</a>`:''}
      </div>
    </div>`;
  }).join('');
}

function toggle(id, el) {
  readIds.add(id);
  el.classList.remove('unread');
  const d=document.getElementById('d-'+id);
  d.classList.toggle('open');
  updateBadge();
  document.getElementById('s-unread').textContent=allItems.filter(i=>!readIds.has(i.id)).length;
}

function updateBadge(){
  const b=document.getElementById('badge');
  const n=allItems.filter(i=>!readIds.has(i.id)).length;
  b.textContent=n+' unread'; b.style.display=n>0?'inline':'none';
}

function startCountdown(){
  clearInterval(timerInt); countdown=300;
  timerInt=setInterval(()=>{
    countdown--;
    const m=Math.floor(countdown/60),s=countdown%60;
    document.getElementById('timer').textContent=`Auto-refresh in ${m}:${s.toString().padStart(2,'0')}`;
    if(countdown<=0) fetchAll();
  },1000);
}

fetchAll();
</script>
</body>
</html>
